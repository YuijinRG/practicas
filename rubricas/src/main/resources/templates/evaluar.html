<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Evaluar</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        .card { border: 1px solid #ccc; padding: 12px; margin-bottom: 12px; }
        input, textarea, select { display: block; width: 320px; margin-bottom: 8px; padding: 8px; }
        button { padding: 8px 12px; }
    </style>
</head>
<body>
<h1>Evaluación dinámica</h1>
<div th:each="rubrica : ${rubricas}" class="card">
    <h3 th:text="${rubrica.nombre}"></h3>
    <p><strong>Curso:</strong> <span th:text="${rubrica.curso}"></span></p>
    <p><strong>Criterios:</strong> <span th:text="${rubrica.criterios}"></span></p>
    <form action="/estudiante/evaluar" method="post">
        <input type="hidden" name="rubricaId" th:value="${rubrica.id}">
        <input type="hidden" name="curso" th:value="${rubrica.curso}">
        <label>Puntaje</label>
        <select name="puntaje">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="30">30</option>
            <option value="40">40</option>
            <option value="50">50</option>
            <option value="60">60</option>
            <option value="70">70</option>
            <option value="80">80</option>
            <option value="90">90</option>
            <option value="100">100</option>
        </select>
        <label>Observación</label>
        <textarea name="observacion" placeholder="Escribe tu observación"></textarea>
        <button type="submit">Guardar evaluación</button>
    </form>
</div>
<p><a href="/logout">Cerrar sesión</a></p>
</body>
</html>
