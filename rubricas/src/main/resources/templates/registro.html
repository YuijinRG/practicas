<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduRúbrica | Registro</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #2563eb);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        .card {
            background: white;
            color: #0f172a;
            padding: 28px;
            border-radius: 18px;
            width: 380px;
            box-shadow: 0 14px 36px rgba(0,0,0,0.2);
        }
        h2 { margin-top: 0; color: #2563eb; }
        p { color: #64748b; }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #2563eb, #0ea5e9);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        .error { color: #dc2626; margin-bottom: 10px; }
        .success { color: #15803d; margin-bottom: 10px; }
        a { color: #2563eb; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="card">
    <h2>Crear cuenta</h2>
    <p>Únete a EduRúbrica para gestionar evaluaciones, rúbricas y seguimiento de aprendizaje.</p>
    <form th:action="@{/registro}" method="post">
        <input type="text" name="username" placeholder="Usuario" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <select name="rol">
            <option value="ESTUDIANTE">Estudiante</option>
            <option value="MAESTRO">Maestro</option>
        </select>
        <div class="error" th:if="${error}" th:text="${error}"></div>
        <div class="success" th:if="${mensaje}" th:text="${mensaje}"></div>
        <button type="submit">Registrarse</button>
    </form>
    <p><a href="/login">Volver al login</a></p>
</div>
</body>
</html>
