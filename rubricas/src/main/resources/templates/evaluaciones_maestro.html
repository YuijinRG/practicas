<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduRúbrica | Evaluaciones</title>
    <style>
        :root { --primary:#2563eb; --primary-dark:#0f172a; --muted:#64748b; --border:#e2e8f0; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #f4f8ff 0%, #eef4ff 100%); color: #0f172a; min-height: 100vh; }
        .app-shell { display: flex; min-height: 100vh; }
        .sidebar { width: 270px; background: linear-gradient(180deg, #081224 0%, #0f172a 100%); color: #fff; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; }
        .brand { font-size: 24px; font-weight: 800; letter-spacing: 0.02em; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 8px; }
        .sidebar-nav a { color: #cbd5e1; text-decoration: none; padding: 12px 14px; border-radius: 12px; transition: all .2s ease; }
        .sidebar-nav a.active, .sidebar-nav a:hover { background: rgba(255,255,255,0.12); color: white; }
        .user-card { margin-top: auto; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.14); border-radius: 16px; padding: 14px; }
        .main { flex: 1; padding: 24px; display: flex; flex-direction: column; gap: 22px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; }
        .topbar h1 { margin: 0; font-size: 28px; }
        .topbar .meta { color: var(--muted); font-size: 14px; }
        .card { background: white; border-radius: 20px; padding: 24px; box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08); transition: transform .2s ease, box-shadow .2s ease; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 16px 36px rgba(15, 23, 42, 0.1); }
        h1 { color: var(--primary); }
        .evaluation-item { padding: 16px 0; border-bottom: 1px solid var(--border); }
        .evaluation-item:last-child { border-bottom: none; padding-bottom: 0; }
        .pill { display: inline-block; padding: 6px 10px; border-radius: 999px; background: #eff6ff; color: var(--primary); font-size: 12px; font-weight: 700; }
        @media (max-width: 980px){ .sidebar{width:220px;} }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">EduRúbrica</div>
        <nav class="sidebar-nav">
            <a href="/maestro">Mi Panel</a>
            <a href="/maestro/rubricas">Rúbricas</a>
            <a class="active" href="/maestro/evaluaciones">Evaluaciones</a>
            <a href="/logout">Cerrar sesión</a>
        </nav>
        <div class="user-card">
            <strong>Prof. Ana Castillo</strong>
            <div class="muted">Docente · Historia</div>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div>
                <h1>Evaluaciones</h1>
                <div class="meta">Historial de evaluaciones registradas.</div>
            </div>
            <div class="meta">Historial académico</div>
        </div>

        <div class="card">
            <div th:each="evaluacion : ${evaluaciones}" class="evaluation-item">
                <p><strong>Estudiante:</strong> <span th:text="${evaluacion.estudiante}"></span></p>
                <p><strong>Curso:</strong> <span th:text="${evaluacion.curso}"></span></p>
                <p><strong>Puntaje:</strong> <span class="pill" th:text="${evaluacion.puntaje}"></span></p>
                <p><strong>Observación:</strong> <span th:text="${evaluacion.observacion}"></span></p>
            </div>
        </div>
    </main>
</div>
</body>
</html>
